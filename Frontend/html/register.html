<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register | CineVista Travels</title>

    <link rel="stylesheet" href="../css/style.css">

    <style>
        .login-container{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            background:#f5f7fa;
        }

        .login-box{
            background:white;
            padding:40px;
            width:400px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        .login-box h2{
            text-align:center;
            color:#0077b6;
            margin-bottom:25px;
        }

        .login-box button{
            width:100%;
            padding:12px;
            border:none;
            background:#0077b6;
            color:white;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        .login-box button:hover{
            background:#023e8a;
        }
    </style>
</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h2>Create Account</h2>

        <form onsubmit="registerUser(event)">

            <input type="text"
                   id="fullname"
                   placeholder="Full Name"
                   required>

            <input type="email"
                   id="email"
                   placeholder="Email Address"
                   required>

            <input type="password"
                   id="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Register
            </button>

        </form>

    </div>

</div>

<script>

function registerUser(event){

    event.preventDefault();

    const fullname =
    document.getElementById("fullname").value;

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    fetch("http://localhost:5000/register", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            fullname,
            email,
            password
        })

    })
    .then(res => res.json())
    .then(data => {

        if(data.success){

            alert("Registration Successful!");

            window.location.href = "login.html";

        }else{

            alert(data.message);

        }

    })
    .catch(err => {

        console.log(err);
        alert("Server Error");

    });

}

</script>
</body>
</html>
